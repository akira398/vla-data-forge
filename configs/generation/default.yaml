# Default reasoning-trace generation config
# Load with: load_config("configs/generation/default.yaml", GenerationConfig)

dataset:
  name: embodied_features_bridge
  hf_repo: Embodied-CoT/embodied_features_bridge
  split: train
  max_episodes: null
  image_size: [256, 256]

backend:
  provider: gemini
  model_name: gemini-1.5-pro
  api_key_env_var: GOOGLE_API_KEY
  max_tokens: 2048
  temperature: 0.0
  max_retries: 5
  requests_per_minute: 15

frame_sampling:
  strategy: uniform       # options: uniform | keyframe | all
  num_frames: 8
  keyframe_threshold: 0.05

output_dir: outputs/generation
batch_size: 1
resume: true
dry_run: false
save_raw_responses: true
num_workers: 1
