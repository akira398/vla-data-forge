# Qwen / Qwen-VL backend config
provider: qwen
model_name: qwen-vl-max
api_key_env_var: DASHSCOPE_API_KEY
mode: api                 # options: api | local
local_model_path: null    # required when mode=local
device: cuda
max_tokens: 2048
temperature: 0.0
top_p: 1.0
max_retries: 5
retry_base_delay: 1.0
retry_max_delay: 60.0
requests_per_minute: 30
timeout: 120.0
